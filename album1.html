<!DOCTYPE html>
<html>
<head>
  <title>School</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      text-align: center;
    }

    h1 {
      margin: 20px;
    }

    .back {
      margin: 10px;
      padding: 10px 20px;
      border: none;
      background: white;
      cursor: pointer;
      border-radius: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      padding: 20px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }
  </style>

</head>

<body>

<h1>School Uniform</h1>

<a href="index.html">
  <button class="back">Back</button>
</a>

<div class="grid">
  <img src="images/album1/img1.jpg">
  <img src="images/album1/img2.jpg">
  <img src="images/album1/img3.jpg">
</div>

</body>
</html>
